name: Build Windows Executable

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install pyinstaller flask pillow reportlab PyPDF2

      - name: Build executable (Windows)
        uses: sayyid5416/pyinstaller@v1
        with:
          python_ver: '3.12'
          spec: 'evidence-validator.spec'
          requirements: 'requirements.txt'
          upload_exe_with_name: 'EvidenceValidator'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EvidenceValidator-Windows
          path: dist/EvidenceValidator.exe
