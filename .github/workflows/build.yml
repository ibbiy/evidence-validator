name: Build Windows + macOS

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller flask pillow reportlab PyPDF2
      - run: pyinstaller evidence-validator.spec --clean
      - uses: actions/upload-artifact@v4
        with:
          name: EvidenceValidator-Windows
          path: dist/EvidenceValidator.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller flask pillow reportlab PyPDF2
      - run: pyinstaller evidence-validator.spec --clean
      - run: |
          # Create .app bundle
          mkdir -p "dist/EvidenceValidator.app/Contents/MacOS"
          mkdir -p "dist/EvidenceValidator.app/Contents/Resources"
          cp dist/EvidenceValidator "dist/EvidenceValidator.app/Contents/MacOS/"
          cat > "dist/EvidenceValidator.app/Contents/Info.plist" << EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleExecutable</key>
    <string>EvidenceValidator</string>
    <key>CFBundleIdentifier</key>
    <string>com.evidence.validator</string>
    <key>CFBundleName</key>
    <string>Evidence Validator</string>
    <key>CFBundleVersion</key>
    <string>1.0.0</string>
    <key>CFBundleShortVersionString</key>
    <string>1.0.0</string>
</dict>
</plist>
EOF
      - uses: actions/upload-artifact@v4
        with:
          name: EvidenceValidator-macOS
          path: dist/EvidenceValidator.app
