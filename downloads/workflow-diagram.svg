<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280">
  <rect width="700" height="280" fill="white" rx="8"/>
  
  <!-- Step 1 -->
  <rect x="20" y="60" width="140" height="80" fill="#1a1a2e" rx="8"/>
  <text x="90" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#889" font-weight="bold">STEP 1</text>
  <text x="90" y="110" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">📁 Drop Files</text>
  <text x="90" y="128" text-anchor="middle" font-family="Arial" font-size="10" fill="#889">Drag or browse</text>
  
  <!-- Arrow -->
  <text x="170" y="105" font-family="Arial" font-size="24" fill="#e94560">→</text>
  
  <!-- Step 2 -->
  <rect x="195" y="60" width="140" height="80" fill="#0f3460" rx="8"/>
  <text x="265" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#889" font-weight="bold">STEP 2</text>
  <text x="265" y="110" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">🔍 Compute Hash</text>
  <text x="265" y="128" text-anchor="middle" font-family="Arial" font-size="10" fill="#889">Choose algorithm</text>
  
  <!-- Arrow -->
  <text x="345" y="105" font-family="Arial" font-size="24" fill="#e94560">→</text>
  
  <!-- Step 3 -->
  <rect x="370" y="60" width="140" height="80" fill="#e94560" rx="8"/>
  <text x="440" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#ffccd4" font-weight="bold">STEP 3</text>
  <text x="440" y="110" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">📋 Review Results</text>
  <text x="440" y="128" text-anchor="middle" font-family="Arial" font-size="10" fill="#ffccd4">Check hashes & meta</text>
  
  <!-- Arrow -->
  <text x="520" y="105" font-family="Arial" font-size="24" fill="#e94560">→</text>
  
  <!-- Step 4 -->
  <rect x="545" y="60" width="140" height="80" fill="#10b981" rx="8"/>
  <text x="615" y="90" text-anchor="middle" font-family="Arial" font-size="11" fill="#b3f0d0" font-weight="bold">STEP 4</text>
  <text x="615" y="110" text-anchor="middle" font-family="Arial" font-size="13" fill="white" font-weight="bold">📄 Export Report</text>
  <text x="615" y="128" text-anchor="middle" font-family="Arial" font-size="10" fill="#b3f0d0">PDF or CSV</text>
  
  <!-- Optional verify path -->
  <text x="350" y="210" text-anchor="middle" font-family="Arial" font-size="11" fill="#888">❓ Want to verify against a known hash?</text>
  
  <rect x="250" y="220" width="200" height="24" fill="none" rx="12" stroke="#e94560"/>
  <text x="350" y="236" text-anchor="middle" font-family="Arial" font-size="11" fill="#e94560" font-weight="bold">Paste hash & tap Verify</text>
  
  <text x="350" y="268" text-anchor="middle" font-family="Arial" font-size="10" fill="#aaa">Green ✅ = file is authentic · Red ❌ = file has been modified</text>
</svg>
