<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400">
  <rect width="700" height="400" fill="#f0f2f5" rx="8"/>
  
  <!-- Header bar -->
  <rect x="0" y="0" width="700" height="40" fill="#1a1a2e" rx="8"/>
  <rect x="0" y="20" width="700" height="20" fill="#1a1a2e"/>
  <circle cx="20" cy="20" r="6" fill="#e94560"/>
  <circle cx="40" cy="20" r="6" fill="#f59e0b"/>
  <circle cx="60" cy="20" r="6" fill="#10b981"/>
  <text x="90" y="26" font-family="Arial" font-size="14" fill="white" font-weight="bold">Evidence Integrity Validator</text>
  
  <!-- Left panel - Case Info -->
  <rect x="15" y="55" width="320" height="60" fill="white" rx="6" stroke="#ddd"/>
  <text x="25" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#333">📋 Case Information</text>
  <rect x="25" y="85" width="140" height="16" fill="#eee" rx="3"/>
  <rect x="175" y="85" width="140" height="16" fill="#eee" rx="3"/>
  
  <!-- Drop zone -->
  <rect x="15" y="125" width="320" height="100" fill="white" rx="6" stroke="#999" stroke-dasharray="5,5"/>
  <text x="175" y="165" text-anchor="middle" font-family="Arial" font-size="14" fill="#999">📁 Drag & Drop Files Here</text>
  <text x="175" y="190" text-anchor="middle" font-family="Arial" font-size="11" fill="#bbb">or browse to select files</text>
  
  <!-- File list -->
  <rect x="15" y="235" width="320" height="140" fill="white" rx="6" stroke="#ddd"/>
  <text x="25" y="255" font-family="Arial" font-size="11" font-weight="bold" fill="#333">📂 Loaded Files</text>
  <rect x="25" y="265" width="290" height="20" fill="#f9f9f9" rx="4"/>
  <text x="35" y="279" font-family="Arial" font-size="10" fill="#555">📄 evidence_photo.jpg</text>
  <rect x="25" y="289" width="290" height="20" fill="#f9f9f9" rx="4"/>
  <text x="35" y="303" font-family="Arial" font-size="10" fill="#555">📄 contract.pdf</text>
  <rect x="25" y="313" width="290" height="20" fill="#f9f9f9" rx="4"/>
  <text x="35" y="327" font-family="Arial" font-size="10" fill="#555">📄 suspicious_doc.docx</text>
  
  <!-- Step arrow -->
  <text x="355" y="195" font-family="Arial" font-size="24" fill="#e94560">➡️</text>
  
  <!-- Right panel - Actions -->
  <rect x="380" y="55" width="305" height="120" fill="white" rx="6" stroke="#ddd"/>
  <text x="390" y="75" font-family="Arial" font-size="12" font-weight="bold" fill="#333">⚡ Actions</text>
  
  <rect x="390" y="85" width="280" height="24" fill="#1a1a2e" rx="4"/>
  <text x="530" y="101" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">🔍 Compute Hashes</text>
  
  <rect x="390" y="115" width="280" height="24" fill="#e94560" rx="4"/>
  <text x="530" y="131" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="white">📄 Generate PDF Report</text>
  
  <rect x="390" y="145" width="280" height="24" fill="none" rx="4" stroke="#ccc"/>
  <text x="530" y="161" text-anchor="middle" font-family="Arial" font-size="11" fill="#666">📊 Export CSV</text>
  
  <!-- Results panel -->
  <rect x="380" y="185" width="305" height="190" fill="white" rx="6" stroke="#ddd"/>
  <text x="390" y="205" font-family="Arial" font-size="12" font-weight="bold" fill="#333">📊 Results</text>
  
  <!-- A result item -->
  <rect x="390" y="215" width="285" height="70" fill="#f9f9f9" rx="4"/>
  <text x="400" y="233" font-family="Arial" font-size="11" font-weight="bold" fill="#333">📄 evidence_photo.jpg</text>
  <rect x="540" y="222" width="55" height="14" fill="#1a1a2e" rx="3"/>
  <text x="567" y="233" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">SHA256</text>
  <rect x="400" y="242" width="265" height="14" fill="#eee" rx="3"/>
  <text x="405" y="253" font-family="monospace" font-size="8" fill="#555">a1b2c3d4e5f6...7890</text>
  <text x="400" y="272" font-family="Arial" font-size="10" fill="#888">📦 2.4 MB  🕐 2026-04-30 14:22</text>
  
  <!-- Another result -->
  <rect x="390" y="290" width="285" height="70" fill="#f0fdf4" rx="4" stroke="#10b981"/>
  <text x="400" y="308" font-family="Arial" font-size="11" font-weight="bold" fill="#333">📄 contract.pdf</text>
  <rect x="540" y="297" width="55" height="14" fill="#1a1a2e" rx="3"/>
  <text x="567" y="308" text-anchor="middle" font-family="Arial" font-size="8" fill="white" font-weight="bold">SHA256</text>
  <rect x="400" y="317" width="265" height="14" fill="#eee" rx="3"/>
  <text x="405" y="328" font-family="monospace" font-size="8" fill="#555">f6e5d4c3b2a1...7890</text>
  <rect x="400" y="336" width="50" height="16" fill="#d1fae5" rx="3"/>
  <text x="425" y="348" text-anchor="middle" font-family="Arial" font-size="9" fill="#065f46" font-weight="bold">✅ MATCH</text>
</svg>
